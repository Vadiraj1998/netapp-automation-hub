<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comment Moderation · NetApp Hub Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', monospace, sans-serif;
      background: #0a0e1a;
      color: #c9d1d9;
      padding: 32px;
      min-height: 100vh;
    }
    h1 { color: #3dc8a0; font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #6e7681; font-size: 13px; margin-bottom: 32px; }

    #loginBox {
      max-width: 400px;
      background: #161b2e;
      border: 1px solid #2a3150;
      border-radius: 12px;
      padding: 32px;
    }
    #loginBox h2 { color: #e6edf3; margin-bottom: 20px; font-size: 16px; }
    input[type="password"] {
      width: 100%;
      background: #0a0e1a;
      border: 1px solid #2a3150;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      margin-bottom: 12px;
    }
    input[type="password"]:focus { border-color: #3dc8a0; }

    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-approve { background: #3dc8a0; color: #0a0e1a; }
    .btn-approve:hover { background: #2fa882; }
    .btn-delete  { background: rgba(255,107,107,0.15); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }
    .btn-delete:hover  { background: rgba(255,107,107,0.25); }
    .btn-login   { background: #3dc8a0; color: #0a0e1a; width: 100%; }

    #adminPanel { display: none; }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .stat {
      background: #161b2e;
      border: 1px solid #2a3150;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 13px;
    }
    .stat-num { font-size: 22px; font-weight: 700; color: #3dc8a0; }

    .comment-card {
      background: #161b2e;
      border: 1px solid #2a3150;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .comment-card.pending { border-left: 3px solid #f5a623; }
    .comment-card.approved { border-left: 3px solid #3dc8a0; opacity: 0.6; }

    .comment-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #6e7681;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .comment-meta strong { color: #3dc8a0; }
    .comment-meta .post-id { color: #7b61ff; }

    .comment-text {
      font-size: 14px;
      line-height: 1.6;
      color: #c9d1d9;
      margin-bottom: 14px;
    }

    .comment-actions { display: flex; gap: 8px; }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a3150;
    }
    .empty { color: #6e7681; font-size: 13px; padding: 16px 0; }
    .loading { color: #6e7681; font-size: 13px; }
    #logoutBtn {
      background: transparent;
      border: 1px solid #2a3150;
      color: #6e7681;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

  <h1>🛡️ Comment Moderation</h1>
  <p class="subtitle">NetApp Hub · Admin Only</p>

  <!-- Login -->
  <div id="loginBox">
    <h2>Enter Admin Password</h2>
    <input type="password" id="adminPassword" placeholder="Password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-login" onclick="login()">Login</button>
    <p id="loginError" style="color:#ff6b6b;font-size:12px;margin-top:8px;"></p>
  </div>

  <!-- Admin Panel -->
  <div id="adminPanel">
    <button id="logoutBtn" onclick="logout()">← Logout</button>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-num" id="statPending">-</div>
        <div>Pending</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statApproved">-</div>
        <div>Approved</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statTotal">-</div>
        <div>Total</div>
      </div>
    </div>

    <div class="section-title">⏳ Pending Approval</div>
    <div id="pendingList"><p class="loading">Loading...</p></div>

    <div class="section-title" style="margin-top:32px;">✅ Approved</div>
    <div id="approvedList"><p class="loading">Loading...</p></div>
  </div>

  <script type="module">
    import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore,
             collectionGroup, getDocs,
             doc, updateDoc, deleteDoc,
             query, orderBy, where }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ── Same config as blog-engagement.js ──
    const FIREBASE_CONFIG = {
        apiKey:            "AIzaSyAozsRXTtidH65UhWv2bqFk3J2fZ2iOtsw",
        authDomain:        "netapp-hub.firebaseapp.com",
        projectId:         "netapp-hub",
        storageBucket:     "netapp-hub.firebasestorage.app",
        messagingSenderId: "599153057916",
        appId:             "1:599153057916:web:b9030d0a2d5d2563a1a9f9"
        };

    // Simple password gate (not for high security — just keeps casual access out)
    // Set your admin password here
    const ADMIN_PASSWORD = "Tantry@98";

    const app = initializeApp(FIREBASE_CONFIG);
    const db  = getFirestore(app);

    window.login = function() {
      const pw = document.getElementById('adminPassword').value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById('loginBox').style.display   = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadAllComments();
      } else {
        document.getElementById('loginError').textContent = 'Incorrect password.';
      }
    };

    window.logout = function() {
      document.getElementById('loginBox').style.display   = 'block';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('adminPassword').value = '';
    };

    async function loadAllComments() {
      const q    = query(collectionGroup(db, 'comments'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);

      const pending  = [];
      const approved = [];

      snap.forEach(d => {
        const data = { id: d.id, ref: d.ref, ...d.data() };
        data.approved ? approved.push(data) : pending.push(data);
      });

      document.getElementById('statPending').textContent  = pending.length;
      document.getElementById('statApproved').textContent = approved.length;
      document.getElementById('statTotal').textContent    = snap.size;

      renderList('pendingList',  pending,  false);
      renderList('approvedList', approved, true);
    }

    function renderList(containerId, comments, isApproved) {
      const el = document.getElementById(containerId);
      if (!comments.length) {
        el.innerHTML = `<p class="empty">None yet.</p>`;
        return;
      }

      el.innerHTML = comments.map(c => {
        const date = c.createdAt?.toDate
          ? c.createdAt.toDate().toLocaleString()
          : 'Unknown';

        return `
          <div class="comment-card ${isApproved ? 'approved' : 'pending'}" id="card-${c.id}">
            <div class="comment-meta">
              <strong>${escHtml(c.name)}</strong>
              <span class="post-id">📄 ${c.postId || 'unknown'}</span>
              <span>${date}</span>
            </div>
            <div class="comment-text">${escHtml(c.comment)}</div>
            <div class="comment-actions">
              ${!isApproved ? `<button class="btn-approve" onclick="approveComment('${c.id}', '${c.postId}')">✅ Approve</button>` : ''}
              <button class="btn-delete" onclick="deleteComment('${c.id}', '${c.postId}')">🗑 Delete</button>
            </div>
          </div>
        `;
      }).join('');
    }

    window.approveComment = async function(commentId, postId) {
      const ref = doc(db, 'posts', postId, 'comments', commentId);
      await updateDoc(ref, { approved: true });
      document.getElementById(`card-${commentId}`).remove();
      loadAllComments();
    };

    window.deleteComment = async function(commentId, postId) {
      if (!confirm('Delete this comment permanently?')) return;
      const ref = doc(db, 'posts', postId, 'comments', commentId);
      await deleteDoc(ref);
      document.getElementById(`card-${commentId}`).remove();
      loadAllComments();
    };

    function escHtml(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
