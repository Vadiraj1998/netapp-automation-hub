<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NetApp ONTAP Cheatsheet | CLI Commands Quick Reference | NetApp Hub</title>
  <link rel="canonical" href="https://vadiraj.dev/cheatsheet.html">
  <meta name="description" content="NetApp ONTAP cheat sheet with common CLI commands for storage engineers, including volume, aggregate, SVM, network, snapshot, and troubleshooting commands.">
  <meta name="keywords" content="NetApp ONTAP cheat sheet, NetApp commands, ONTAP CLI, storage commands, NetApp automation">
  <meta name="author" content="Vadiraj">
  <meta name="robots" content="index, follow">

  <meta property="og:title" content="NetApp ONTAP CheatSheet | NetApp Hub">
  <meta property="og:description" content="Quick reference for common NetApp ONTAP CLI commands.">
  <meta property="og:url" content="https://vadiraj.dev/netapp-cheatsheet.html">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="NetApp ONTAP Cheat Sheet | NetApp Hub">
  <meta name="twitter:description" content="Quick reference for common NetApp ONTAP CLI commands.">

  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

</head>
<body>
  <div class="noise"></div>
   
  <!-- Sidebar -->
  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

  <main class="main-content">
    <header class="page-header">
      <div class="header-badge">QUICK REF</div>
      <h1 class="page-title">NetApp ONTAP Cheatsheet</h1>
      <p class="page-subtitle">Common CLI commands for daily storage administration, troubleshooting, and automation workflows.</p>
    </header>

    <section class="content-section">

      <div class="cheat-toolbar">
        <input
          id="commandSearch"
          class="cheat-search"
          type="text"
          placeholder="Search commands, category, or description..."
        />

        <select id="categoryFilter" class="cheat-filter">
          <option value="all">All Categories</option>
        </select>

        <div class="result-count" id="cheatCount">0 commands</div>
      </div>

      <div class="cheat-grid" id="cheatSheetContent"></div>
      <div class="no-results" id="noResults">No commands found for the current search or filter.</div>
    </section>

    <div id="footer-container"></div>
  </main>

  <script src="assets/js/sidebar-loader.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/data/commands-data.js"></script>
  <script src="assets/js/search.js"></script>

  <script>
    function renderCheatSheet(commands) {
      const cheatGrid = document.getElementById('cheatGrid');
      const cheatResultCount = document.getElementById('cheatResultCount');
      if (!cheatGrid) return;
  
      const filterValue = (document.getElementById('cheatFilter')?.value || '').toLowerCase();
  
      const filtered = commands.filter(cmd => {
        const text = `${cmd.name} ${cmd.description} ${cmd.tag}`.toLowerCase();
        return text.includes(filterValue);
      });
  
      cheatResultCount.textContent = `${filtered.length} command${filtered.length !== 1 ? 's' : ''}`;
  
      const grouped = {};
      filtered.forEach(cmd => {
        if (!grouped[cmd.tag]) grouped[cmd.tag] = [];
        grouped[cmd.tag].push(cmd);
      });
  
      let html = '';
      Object.keys(grouped).sort().forEach(groupName => {
        html += `
          <div class="cheat-card">
            <h3>${groupName}</h3>
            ${grouped[groupName].map(cmd => `
              <div class="cmd-item">
                <code class="cmd-code">${cmd.name}</code>
                <div class="cmd-desc">${cmd.description}</div>
              </div>
            `).join('')}
          </div>
        `;
      });
  
      cheatGrid.innerHTML = html || '<p style="color: var(--text-dim);">No commands found.</p>';
    }
  
    document.addEventListener('DOMContentLoaded', () => {
      try {
        const data = getCommandsDataSync();
        renderCheatSheet(data.commands);
  
        const filter = document.getElementById('cheatFilter');
        if (filter) {
          filter.addEventListener('input', () => renderCheatSheet(data.commands));
        }
      } catch (error) {
        console.error('Failed to load cheat sheet:', error);
        const cheatGrid = document.getElementById('cheatGrid');
        if (cheatGrid) {
          cheatGrid.innerHTML = '<p style="color:red;">Failed to load cheat sheet.</p>';
        }
      }
    });
  </script>
</body>
</html>
